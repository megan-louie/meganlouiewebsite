{% extends "layout.html" %}

{% block content %}
<!-- Hero Section -->
<section class="hero" id="home">
    <video class="hero-video" autoplay muted loop>
        <source src="{{ url_for('static', filename='video/background.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="hero-text">
                    <h1 class="display-4 text-light mb-4">Megan Z. Louie</h1>
                    <p class="lead text-light mb-4">Project Manager & IT Professional with expertise in Agile methodologies, data analysis, and cross-functional team leadership.</p>
                    <div class="cta-buttons">
                        <a href="{{ url_for('projects') }}" class="btn btn-outline-light btn-lg me-3">View My Projects</a>
                        <a href="{{ url_for('experience') }}" class="btn btn-outline-light btn-lg">My Experience</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="hero-image-container text-center">
                    <img src="{{ url_for('static', filename='img/profile.jpg') }}" alt="Megan Louie" class="img-fluid rounded-circle profile-image">
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
